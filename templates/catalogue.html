{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Store Catalogue</h2>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for p in products %}
    <div class="col">
        <div class="card h-100 border-0 shadow-sm bg-light">
            <div class="card-body">
                
                <div class="text-center mb-3">
                    <span style="font-size: 5rem;">{{ p.icon }}</span>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="card-title text-primary fw-bold mb-0">{{ p.name }}</h5>
                    <span class="badge bg-secondary">{{ p.category }}</span>
                </div>
                
                <h4 class="mt-2">${{ "%.2f"|format(p.price) }}</h4>
                <p class="text-muted small">Available Stock: {{ p.stock_level }}</p>
                
                <hr>
                
                {% if p.stock_level > 0 %}
                    <form action="/add_to_cart/{{ p.product_id }}" method="POST" class="d-flex gap-2">
                        <input type="number" name="quantity" value="1" min="1" max="{{ p.stock_level }}" class="form-control w-50">
                        <button type="submit" class="btn btn-outline-primary w-50">Add to Cart</button>
                    </form>
                {% else %}
                    <button class="btn btn-secondary w-100 fw-bold" disabled>Out of Stock / Unavailable</button>
                {% endif %}
                
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
