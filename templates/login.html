{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Welcome Back</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted">Email address</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
        </form>

        <!-- Testing Credentials Box -->
        <div class="alert alert-secondary border-0 shadow-sm mt-4 pb-3">
            <h6 class="alert-heading fw-bold text-muted mb-2">🛠️ Staff Credentials</h6>
            <div class="small">
                <p class="mb-1"><strong>Staff Email:</strong> admin@yls.com</p>
                <p class="mb-0"><strong>Password:</strong> admin123</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
